# Scheduled jobs via GitHub Actions instead of Vercel Cron — works on
# Vercel's free Hobby plan (which caps crons at 2/daily and rejects our
# hourly outreach drain at build time).
#
# One-time setup in GitHub → Settings → Secrets and variables → Actions:
#   Variable  APP_URL      = https://your-deployment.vercel.app
#   Secret    CRON_SECRET  = same value as the CRON_SECRET env var in Vercel
#
# Until those are set, runs no-op gracefully.

name: scheduled-jobs

on:
  schedule:
    - cron: "20 * * * *"  # outreach: drain due email touches (hourly)
    - cron: "0 7 * * *"   # growth: discovery + lead pipeline (daily)
    - cron: "35 13 * * *" # digest: client morning summaries (daily)
    - cron: "0 9 * * *"   # cleanup: expired demo pruning (daily)
  workflow_dispatch:
    inputs:
      job:
        description: "Which cron endpoint to hit"
        required: true
        type: choice
        options: [outreach, growth, digest, cleanup]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL variable / CRON_SECRET secret not set yet — skipping."
            exit 0
          fi

          case "${{ github.event_name == 'workflow_dispatch' && inputs.job || github.event.schedule }}" in
            outreach|"20 * * * *") path="/api/cron/outreach" ;;
            growth|"0 7 * * *")    path="/api/cron/growth" ;;
            digest|"35 13 * * *")  path="/api/cron/digest" ;;
            cleanup|"0 9 * * *")   path="/api/cron/cleanup" ;;
            *) echo "Unknown trigger"; exit 1 ;;
          esac

          echo "GET $path"
          curl -fsS --max-time 280 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${APP_URL%/}${path}"
